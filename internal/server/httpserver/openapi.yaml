openapi: 3.0.3
info:
  title: SQLFactory API
  version: "1.0"
  description: |
    HTTP API SQLFactory.

    Человеческая документация: `docs/API.md`.

servers:
  - url: /
    description: Текущий хост (например http://localhost:8080)

tags:
  - name: auth
  - name: templates
  - name: history
  - name: dict
  - name: executor

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Код ошибки (InternalError, NotFound, ValidationError, Unauthorized, AlreadyExists)

    Tokens:
      type: object
      required:
        - access_token
        - refresh_token
        - access_token_expires_at
        - refresh_token_expires_at
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        access_token_expires_at:
          type: integer
          format: int64
          description: Unix time (sec) истечения access token
        refresh_token_expires_at:
          type: integer
          format: int64
          description: Unix time (sec) истечения refresh token

    IdResponse:
      type: object
      required: [id]
      properties:
        id:
          type: integer

    Template:
      type: object
      properties:
        id:
          type: integer
        db:
          type: string
        title:
          type: string
        query:
          type: string
        chart_type:
          type: string

    HistoryItem:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        db:
          type: string
        create_at:
          type: string
          format: date-time
        title:
          type: string
        prompt:
          type: string
        query:
          type: string
        table_data:
          description: JSON результат (header + data), как хранится в БД
        chart_type:
          type: string
        reasoning:
          description: JSON (часто массив строк), как хранится в БД

    DictItem:
      type: object
      properties:
        id:
          type: integer
        db:
          type: string
        word:
          type: string
        meaning:
          type: string

    DictMap:
      type: object
      additionalProperties:
        type: string
      description: Слово → значение

    QueryResult:
      type: object
      properties:
        header:
          type: array
          items:
            type: string
        data:
          type: array
          items:
            type: array
            items:
              type: string

    LLMExecuteResult:
      type: object
      properties:
        query:
          type: string
        title:
          type: string
        table_data:
          $ref: "#/components/schemas/QueryResult"
        chart_type:
          type: string
        reasoning:
          description: JSON-массив шагов объяснения

    ExecuteResult:
      type: object
      properties:
        table_data:
          $ref: "#/components/schemas/QueryResult"

    ConnectionForm:
      type: object
      required: [host, port, user, password, database, db_type]
      properties:
        host:
          type: string
        port:
          type: integer
        user:
          type: string
        password:
          type: string
        database:
          type: string
        db_type:
          type: string
          description: Например mysql, postgres

paths:
  /api/auth/register:
    post:
      tags: [auth]
      summary: Регистрация
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string }
                password: { type: string }
                name: { type: string }
      responses:
        "200": { description: OK }
        "400":
          description: ValidationError
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: AlreadyExists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/login:
    post:
      tags: [auth]
      summary: Вход
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tokens" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Обновление токенов
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tokens" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/check-token:
    get:
      tags: [auth]
      summary: Проверка access token
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/template:
    post:
      tags: [templates]
      summary: Создать шаблон
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Template" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResponse" }
    put:
      tags: [templates]
      summary: Обновить шаблон
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Template" }
      responses:
        "200": { description: OK }
    delete:
      tags: [templates]
      summary: Удалить шаблон
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/templates:
    get:
      tags: [templates]
      summary: Список шаблонов по БД
      security:
        - bearerAuth: []
      parameters:
        - name: db
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Template" }

  /api/history:
    get:
      tags: [history]
      summary: История по БД
      security:
        - bearerAuth: []
      parameters:
        - name: db
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HistoryItem" }
    delete:
      tags: [history]
      summary: Удалить запись истории
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/history/item:
    get:
      tags: [history]
      summary: Одна запись истории
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HistoryItem" }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/dict:
    get:
      tags: [dict]
      summary: Словарь по БД
      security:
        - bearerAuth: []
      parameters:
        - name: db
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DictMap" }

  /api/dict/item:
    post:
      tags: [dict]
      summary: Добавить элемент словаря
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DictItem" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResponse" }
    put:
      tags: [dict]
      summary: Обновить элемент словаря
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DictItem" }
      responses:
        "200": { description: OK }
    delete:
      tags: [dict]
      summary: Удалить элемент словаря
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/executor/prompt:
    post:
      tags: [executor]
      summary: Выполнить пользовательский промпт (LLM + SQL)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: "#/components/schemas/ConnectionForm"
                - type: object
                  required: [prompt]
                  properties:
                    prompt: { type: string }
      responses:
        "200":
          description: |
            Успех — LLMExecuteResult.
            При ошибке внешней БД сервер может вернуть HTTP 200 с `{ "error": "..." }`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LLMExecuteResult"
                  - $ref: "#/components/schemas/Error"

  /api/executor/template:
    post:
      tags: [executor]
      summary: Выполнить сохранённый шаблон
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: "#/components/schemas/ConnectionForm"
                - type: object
                  required: [template_id]
                  properties:
                    template_id: { type: integer }
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ExecuteResult"
                  - $ref: "#/components/schemas/Error"

  /api/executor/history:
    post:
      tags: [executor]
      summary: Повторить запрос из истории
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: "#/components/schemas/ConnectionForm"
                - type: object
                  required: [item_id]
                  properties:
                    item_id: { type: integer }
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ExecuteResult"
                  - $ref: "#/components/schemas/Error"

